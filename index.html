<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Librería Escáner</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .header { background: #1a237e; padding: 14px 16px; text-align: center; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 8px; z-index: 20;}
    .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; background: #c62828; color: white; transition: background 0.3s;}
    .badge.linked { background: #2e7d32; }

    #reader-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; background: #000;}
    #camera-stream { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0;}
    
    .scan-guide { position: absolute; width: 85%; max-width: 400px; height: 150px; border: 2px dashed rgba(255, 255, 255, 0.5); border-radius: 12px; pointer-events: none; display: flex; align-items: center; justify-content: center;}
    .scan-guide::after { content: ''; width: 100%; height: 2px; background: rgba(255, 0, 0, 0.6); box-shadow: 0 0 10px red; }

    /* Overlay para feedback visual (Aciertos y Errores) */
    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    #overlay.visible { opacity: 1; pointer-events: auto; }
    #overlay-icon { font-size: 4rem; margin-bottom: 10px; }
    #overlay-text { font-size: 1.2rem; font-weight: bold; text-align: center; padding: 0 20px; }
  </style>
</head>
<body>

  <div class="header">
    <span class="material-symbols-outlined">qr_code_scanner</span> Escáner
    <span class="badge" id="headerBadge">NO VINCULADO</span>
  </div>

  <div id="reader-container">
    <video id="camera-stream" autoplay playsinline muted></video>
    <div class="scan-guide"></div>
    
    <div id="overlay">
      <span class="material-symbols-outlined" id="overlay-icon">info</span>
      <div id="overlay-text">Mensaje</div>
    </div>
  </div>

  <script>
    let isProcessing = false;
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const videoElement = document.getElementById('camera-stream');

    // ── GESTIÓN DE LA INTERFAZ Y EL OVERLAY ──
    function checkStatus() {
      const url = localStorage.getItem('apiUrl');
      const caja = localStorage.getItem('cajaId');
      const badge = document.getElementById('headerBadge');
      
      if (url && caja) {
        badge.textContent = 'CAJA ' + caja;
        badge.classList.add('linked');
      } else {
        badge.textContent = 'NO VINCULADO';
        badge.classList.remove('linked');
      }
    }

    function showOverlay(icon, text, bgColor, duration = 1500) {
      const overlay = document.getElementById('overlay');
      document.getElementById('overlay-icon').textContent = icon;
      document.getElementById('overlay-text').textContent = text;
      overlay.style.background = bgColor;
      overlay.classList.add('visible');
      
      setTimeout(() => {
        overlay.classList.remove('visible');
        isProcessing = false;
      }, duration);
    }

    // ── INICIALIZACIÓN DE LA CÁMARA ──
    window.addEventListener('load', () => {
      checkStatus();
      
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => {
          videoElement.srcObject = stream;
          videoElement.setAttribute("playsinline", true);
          videoElement.play();
          
          // El escáner lee de forma continua
          codeReader.decodeFromVideoElement(videoElement, (result, err) => {
            if (result && !isProcessing) {
              handleScan(result.getText());
            }
          });
        })
        .catch(err => {
          showOverlay('no_photography', 'Permiso de cámara denegado', 'rgba(200, 0, 0, 0.9)', 5000);
        });
    });

    // ── LÓGICA DE ESCANEO "TODO EN UNO" ──
    async function handleScan(text) {
      isProcessing = true;
      if (navigator.vibrate) navigator.vibrate(50);

      // 1. ¿Es un Código QR de Configuración? (Empieza por '{' y tiene nuestras claves)
      if (text.startsWith('{') && text.includes('"url"') && text.includes('"caja"')) {
        try {
          const config = JSON.parse(text);
          if (config.url && config.caja) {
            localStorage.setItem('apiUrl', config.url);
            localStorage.setItem('cajaId', config.caja);
            checkStatus();
            showOverlay('check_circle', 'Caja ' + config.caja + ' Vinculada Correctamente', 'rgba(0, 150, 0, 0.9)', 2000);
            return; // Termina aquí
          }
        } catch(e) { /* Fallo al parsear JSON, ignoramos */ }
      }

      // 2. ¿Es un Código de Barras de un libro? (Normalmente 13 dígitos)
      if (text.length >= 10 && !text.startsWith('{')) {
        const apiUrl = localStorage.getItem('apiUrl');
        const cajaId = localStorage.getItem('cajaId');

        // Si intenta escanear un libro sin haber configurado la caja primero...
        if (!apiUrl || !cajaId) {
          showOverlay('phonelink_setup', 'Apunta primero al QR de la pantalla del ordenador', 'rgba(200, 100, 0, 0.9)', 3000);
          return;
        }

        // Si está configurado, enviamos el código a Google Apps Script
        enviarCodigoLibro(apiUrl, cajaId, text);
      } else {
        // Si lee basura, ignorar rápido
        isProcessing = false;
      }
    }

    // ── COMUNICACIÓN FETCH (POST) CON GOOGLE SCRIPT ──
    async function enviarCodigoLibro(url, caja, codigo) {
      showOverlay('wifi_tethering', 'Enviando...', 'rgba(0, 0, 150, 0.8)', 10000); // Overlay permanente hasta que responda

      try {
        const response = await fetch(url, {
          method: 'POST',
          // Usamos text/plain para evitar el bloqueo CORS (Preflight OPTIONS) del navegador
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
          body: JSON.stringify({ action: 'setScannerCode', caja: caja, codigo: codigo })
        });
        
        const result = await response.json();
        
        if (result.ok) {
           showOverlay('check_circle', '¡Libro enviado!', 'rgba(0, 150, 0, 0.9)');
        } else {
           showOverlay('error', 'Error: ' + result.error, 'rgba(200, 0, 0, 0.9)', 2000);
        }
      } catch (err) {
         showOverlay('cloud_off', 'Fallo de conexión', 'rgba(200, 0, 0, 0.9)', 2000);
      }
    }
  </script>
</body>
</html>
