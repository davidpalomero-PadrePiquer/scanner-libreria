<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Escáner Móvil</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script type="text/javascript" src="https://unpkg.com/@zxing/library@0.21.3"></script>
  <style>
    /* TU CSS INTACTO */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .header { background: #1a237e; padding: 14px 16px; text-align: center; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .badge { background: #ff6f00; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; }

    #setup { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; gap: 20px; }
    #setup h2 { font-size: 1.3rem; }
    #setup .field { width: 100%; max-width: 400px; }
    #setup label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }
    #setup input { width: 100%; padding: 12px; border: 2px solid #333; border-radius: 8px; background: #1e1e1e; color: white; font-size: 1rem; }
    #setup input:focus { border-color: #ff6f00; outline: none; }
    #setup .hint { font-size: 0.8rem; color: #888; margin-top: 4px; }
    .btn-start { background: #2e7d32; color: white; border: none; padding: 14px 32px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }

    #scanner { display: none; flex: 1; flex-direction: column; }
    #reader-container { flex: 1; position: relative; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    #camera-stream { width: 100%; height: 100%; object-fit: cover; }
    .scan-guide { position: absolute; width: 75%; max-width: 320px; height: 100px; border: 3px solid rgba(0,255,0,0.5); border-radius: 12px; pointer-events: none; z-index: 2; }

    .status-bar { padding: 16px; text-align: center; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    .status-row { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 1rem; transition: all 0.3s; }
    .status-row.success { color: #4caf50; }
    .status-row.sending { color: #ffeb3b; }
    .status-row.error { color: #f44336; }
    .status-row.ready { color: #b0bec5; }

    .last-code { font-size: 0.85rem; color: #888; margin-top: 4px; }
    .btn-change { background: rgba(255,255,255,0.15); color: #ccc; border: none; padding: 6px 14px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; margin-top: 4px; }

    .flash { animation: flashGreen 0.3s; }
    @keyframes flashGreen {
      0% { box-shadow: inset 0 0 0 4px rgba(76,175,80,0.8); }
      100% { box-shadow: inset 0 0 0 0 rgba(76,175,80,0); }
    }
  </style>
</head>
<body>

  <div id="setup">
    <span class="material-symbols-outlined" style="font-size:64px; color:#ff6f00;">qr_code_scanner</span>
    <h2>Escáner Móvil</h2>
    <p style="color:#aaa; text-align:center; max-width:350px;">Conecta este teléfono a una caja registradora para escanear códigos de barras de libros.</p>

    <div class="field">
      <label>URL del sistema (Apps Script)</label>
      <input type="url" id="inputUrl" placeholder="https://script.google.com/macros/s/.../exec" />
      <div class="hint">Pega la URL, o déjalo en blanco y pulsa iniciar para escanear el QR.</div>
    </div>

    <div class="field">
      <label>Número de Caja</label>
      <input type="number" id="inputCaja" value="1" min="1" max="99" />
    </div>

    <button class="btn-start" onclick="iniciar()">
      <span class="material-symbols-outlined">play_arrow</span> Iniciar escáner
    </button>
    <div id="setupError" style="color:#f44; font-size:0.9rem; display:none;"></div>
  </div>

  <div id="scanner">
    <div class="header">
      <span class="material-symbols-outlined">qr_code_scanner</span> Escáner Móvil
      <span class="badge" id="badgeCaja">CAJA 1</span>
    </div>

    <div id="reader-container">
      <video id="camera-stream" autoplay playsinline muted></video>
      <div class="scan-guide"></div>
    </div>

    <div class="status-bar">
      <div class="status-row ready" id="statusRow">
        <span class="material-symbols-outlined" id="statusIcon">center_focus_strong</span>
        <span id="statusText">Iniciando cámara...</span>
      </div>
      <div class="last-code" id="lastCode"></div>
      <button class="btn-change" onclick="volver()">Cambiar caja / URL</button>
    </div>
  </div>

  <script>
    var API_URL = '';
    var CAJA = '1';
    var isProcessing = false;
    var codeReader = null;

    // ── Persistencia ──
    function guardarConfig() {
      try { localStorage.setItem('scanner_url', API_URL); localStorage.setItem('scanner_caja', CAJA); } catch(e) {}
    }
    function cargarConfig() {
      try {
        var u = localStorage.getItem('scanner_url');
        var c = localStorage.getItem('scanner_caja');
        if (u) document.getElementById('inputUrl').value = u;
        if (c) document.getElementById('inputCaja').value = c;
      } catch(e) {}
    }

    // ── Iniciar / volver ──
    function iniciar() {
      var url = document.getElementById('inputUrl').value.trim();
      var caja = document.getElementById('inputCaja').value.trim();
      var errEl = document.getElementById('setupError');

      // Se permite iniciar con la URL vacía para poder escanear el QR
      if (url && !url.includes('script.google.com')) {
        errEl.textContent = 'Si pones una URL, debe ser de Google Apps Script';
        errEl.style.display = 'block';
        return;
      }
      
      errEl.style.display = 'none';
      API_URL = url;
      CAJA = caja || '1';
      if (url) guardarConfig();

      document.getElementById('badgeCaja').textContent = 'CAJA ' + CAJA;
      document.getElementById('setup').style.display = 'none';
      document.getElementById('scanner').style.display = 'flex';
      startScanner();
    }

    function volver() {
      stopScanner();
      document.getElementById('scanner').style.display = 'none';
      document.getElementById('setup').style.display = 'flex';
    }

    // ── TU API ORIGINAL ──
    async function enviarCodigo(codigo) {
      if (!API_URL) throw new Error('Falta URL');
      var sep = API_URL.includes('?') ? '&' : '?';
      var url = API_URL + sep + 'page=api&action=setScannerCode&caja=' + encodeURIComponent(CAJA) + '&codigo=' + encodeURIComponent(codigo);
      await fetch(url, { mode: 'no-cors' });
      return { ok: true };
    }

    // ── UI ──
    function setStatus(text, type, icon) {
      document.getElementById('statusRow').className = 'status-row ' + (type || 'ready');
      document.getElementById('statusIcon').textContent = icon || 'center_focus_strong';
      document.getElementById('statusText').textContent = text;
    }

    function flashEffect() {
      var c = document.getElementById('reader-container');
      c.classList.remove('flash');
      void c.offsetWidth;
      c.classList.add('flash');
    }

    // ── LÓGICA REPARADA (Distingue entre QR y Libro) ──
    async function onScanSuccess(code) {
      if (isProcessing) return;
      isProcessing = true;

      // 1. Comprobar si lo que acaba de leer es el QR de Configuración
      if (code.includes('"url"') && code.includes('"caja"')) {
        try {
          var config = JSON.parse(code);
          if (config.url && config.caja) {
            API_URL = config.url;
            CAJA = config.caja;
            guardarConfig();
            
            document.getElementById('inputUrl').value = API_URL;
            document.getElementById('inputCaja').value = CAJA;
            document.getElementById('badgeCaja').textContent = 'CAJA ' + CAJA;
            
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            setStatus('¡Caja ' + CAJA + ' vinculada!', 'success', 'check_circle');
            
            setTimeout(function() {
              setStatus('Apunta al código del libro', 'ready', 'center_focus_strong');
              isProcessing = false;
            }, 2000);
            return; // Terminamos aquí, no se envía a Google
          }
        } catch(e) {}
      }

      // 2. Si no es un QR, es un libro. Comprobamos si la caja está vinculada.
      if (!API_URL) {
        setStatus('Falta vincular la caja (Escanea el QR)', 'error', 'warning');
        setTimeout(function() { isProcessing = false; }, 2000);
        return;
      }

      // 3. Tu flujo original de envío
      if (navigator.vibrate) navigator.vibrate(100);
      flashEffect();
      setStatus('Enviando ' + code + '...', 'sending', 'wifi_tethering');

      try {
        await enviarCodigo(code);
        setStatus('Enviado ✓  ' + code, 'success', 'check_circle');
        document.getElementById('lastCode').textContent = 'Último: ' + code;
      } catch (e) {
        if (e.message === 'Falta URL') {
          setStatus('Falta vincular caja', 'error', 'warning');
        } else {
          setStatus('Error de red', 'error', 'error_outline');
        }
      }

      setTimeout(function() {
        setStatus('Apunta al código del libro', 'ready', 'center_focus_strong');
        isProcessing = false;
      }, 1500);
    }

    // ── MOTOR DE CÁMARA — ZXing ORIGINAL ──
    function startScanner() {
      var hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.QR_CODE,
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.UPC_A,
        ZXing.BarcodeFormat.UPC_E
      ]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

      codeReader = new ZXing.BrowserMultiFormatReader(hints);

      codeReader.listVideoInputDevices()
        .then(function(devices) {
          var cams = devices.filter(function(d) { return d.kind === 'videoinput'; });

          var selectedId = null;
          for (var i = 0; i < cams.length; i++) {
            var label = (cams[i].label || '').toLowerCase();
            if (label.includes('back') || label.includes('rear') || label.includes('trasera') || label.includes('environment')) {
              selectedId = cams[i].deviceId;
              break;
            }
          }
          if (!selectedId && cams.length > 0) {
            selectedId = cams[cams.length - 1].deviceId;
          }

          return codeReader.decodeFromVideoDevice(selectedId, 'camera-stream', function(result, err) {
            if (result && !isProcessing) {
              var texto = result.getText();
              // Ya sea un libro (>=8 dígitos) o un QR (empieza por {), lo mandamos a procesar
              if (texto && (texto.length >= 8 || texto.startsWith('{'))) {
                onScanSuccess(texto);
              }
            }
          });
        })
        .then(function() {
          setStatus('Apunta al código del libro o QR', 'ready', 'center_focus_strong');
        })
        .catch(function(err) {
          console.error('Camera error:', err);
          setStatus('Error de cámara: ' + err.message, 'error', 'no_photography');
        });
    }

    function stopScanner() {
      if (codeReader) {
        codeReader.reset();
        codeReader = null;
      }
    }

    // ── Arranque ──
    cargarConfig();
    window.addEventListener('beforeunload', stopScanner);
  </script>
</body>
</html>
